# Tech Radar — source config
# Each source has enabled + its own options (channels, keywords, feeds...).

sources:
  anthropic:
    enabled: true
    feeds: [news, engineering, changelog, courses, events]

  youtube:
    enabled: true
    # channel_id: find it in the page source of the YouTube channel page (search "channelId")
    channels:
      # AI / general tech
      - {name: "Fireship",           id: "UCsBjURrPoezykLs9EqgamOA"}
      - {name: "AI Explained",       id: "UCNJ1Ymd5yFuUPtn21xtRbbw"}
      - {name: "Matt Wolfe",         id: "UChpleBmo18P08aKCIgti38g"}
      - {name: "Matthew Berman",     id: "UCawZsQWqfGSbCI5yjkdVkTA"}
      - {name: "Two Minute Papers",  id: "UCbfYPyITQ-7l4upoX8nvctg"}
      # Backend / systems / cloud
      - {name: "Hussein Nasser",     id: "UC_ML5xP23TOWKUcc-oAE_Eg"}
      - {name: "ByteByteGo",         id: "@ByteByteGo"}
      - {name: "TechWorld with Nana", id: "@TechWorldwithNana"}
    # Keyword filter (case-insensitive, substring match). Empty = no filter.
    keywords: []

  huggingface:
    enabled: true

  hackernews:
    enabled: true

  cloudflare:
    enabled: true

  devto:
    enabled: true
    # Empty = all feeds; specify labels to enable only some.
    # Options: "dev.to", "daily.dev"
    feeds: []
    # Keyword filter — community feeds can have high volume (empty = no filter)
    keywords: []

  engineering:
    enabled: true
    # Empty = all feeds; specify labels to enable only some
    # Options: "Martin Fowler", "AWS Blog", "The New Stack", "InfoQ"
    feeds: []
    keywords: []

  github_trending:
    enabled: true
    # Topic-based filters over the all-language trending feed.
    # Each topic keeps repos whose title or description contains one of its keywords.
    topics:
      - name: "Database"
        keywords: [database, postgres, postgresql, mysql, sqlite, redis, mongodb, query, index, migration, oltp, olap, sql]
      - name: "Software Engineering"
        keywords: [software engineering, developer, code review, testing, architecture, backend, api, observability, opentelemetry, logging, tracing, reliability, scalability, refactoring, ci/cd, deployment, auth, concurrency]
      - name: "Distributed Systems"
        keywords: [distributed, consensus, raft, kubernetes, queue, streaming, microservice, database, cache]
      - name: "Performance"
        keywords: [performance, optimization, optimize, fast, latency, benchmark, profiling, memory]
      - name: "AI"
        keywords: [ai, agent, llm, machine learning, embedding, rag, model, inference]
      - name: "Finance"
        keywords: [finance, fintech, trading, portfolio, stock, crypto, investment, payment]
      - name: "Productivity"
        keywords: [productivity, automation, workflow, notes, task, calendar, email, document]
    # Optional extra global keyword filter after topic matching.
    keywords: []

  security:
    enabled: true
    # Empty = all feeds; specify names to enable only some
    # Options: "The Hacker News", "Bleeping Computer", "Krebs on Security",
    #          "Schneier on Security", "SecurityWeek", "Google Project Zero"
    feeds: []
    # Keyword filter (case-insensitive, empty = no filter)
    keywords: []
